# =============================================
#   RankScript — Redis Configuration
# =============================================

# Network — bind to all interfaces inside Docker network
# In production, restrict to: bind 127.0.0.1 <container_ip>
bind 0.0.0.0
port 6379

# FIX: protected-mode yes requires either a bind address or a password.
# Inside Docker the container network provides isolation, but we still
# enable protection as defense-in-depth. Set REDIS_PASSWORD in .env
# and pass it via docker-compose command: redis-server ... --requirepass $REDIS_PASSWORD
protected-mode yes

# Persistence — save DB to disk
save 900 1
save 300 10
save 60 10000

# Max memory — 256mb for local dev; raise in production
maxmemory 256mb
maxmemory-policy allkeys-lru

# Logging
loglevel notice
logfile ""

# Database count
databases 16
