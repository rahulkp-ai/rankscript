# =============================================================
#  RankScript — CI pipeline (free on GitHub Actions for public repos)
#
#  Copy this file to: .github/workflows/ci.yml
#  (GitHub only picks up workflows from that exact path.)
#
#  Runs backend pytest + frontend lint/test/build on every push
#  and pull request against main. Render and Vercel already
#  auto-deploy on push by default, so no deploy step is required
#  here — this is purely a safety net so broken code never reaches
#  main silently.
# =============================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run pytest
        run: pytest

  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
